[package]
name = "wallabag-rs"
version = "0.1.0"
edition = "2024"

[dependencies]
sqlx = { version = "0.8.6", features = ["migrate", "sqlite", "runtime-tokio"] }
actix-web = "4.12.1"
env_logger = "0.11.8"
anyhow = "1.0.100"
serde = "1.0.228"
serde_json = "1.0.145"
serde_with = "3.16.1"
rand = "0.9.2"
url = { version = "2.5.7", features = ["serde"] }
chrono = { version = "0.4.42", features = ["serde"] }